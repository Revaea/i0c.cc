name: Runtime CI

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/runtime-ci.yml
      - apps/runtime/**
      - packages/config/**
      - packages/plugin-api/**
      - packages/plugin-catalog/**
      - packages/analytics-domain/**
      - plugins/feature/bot-classifier/**
      - plugins/runtime/**
      - plugins/sink/http/**
      - plugins/source/github/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  push:
    branches:
      - main
    paths:
      - .github/workflows/runtime-ci.yml
      - apps/runtime/**
      - packages/config/**
      - packages/plugin-api/**
      - packages/plugin-catalog/**
      - packages/analytics-domain/**
      - plugins/feature/bot-classifier/**
      - plugins/runtime/**
      - plugins/sink/http/**
      - plugins/source/github/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Runtime types
        run: pnpm runtime:check

      - name: Test Runtime
        run: pnpm runtime:test

      - name: Build Cloudflare Runtime
        run: pnpm runtime:build:cf

      - name: Build Vercel Runtime
        run: pnpm runtime:build:vc

      - name: Build Netlify Runtime
        run: pnpm runtime:build:nf
