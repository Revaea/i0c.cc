name: WebUI CI

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/webui-ci.yml
      - i0c.runtime.config.ts
      - i0c.runtime.manifests.ts
      - i0c.webui.config.ts
      - i0c.webui.manifests.ts
      - apps/webui/**
      - packages/config/**
      - packages/plugin-api/**
      - packages/plugin-catalog/**
      - packages/runtime-build/src/config.ts
      - packages/analytics-domain/**
      - plugins/source/github/**
      - plugins/store/**
      - plugins/**/src/manifest.ts
      - plugins/runtime/**/src/installation.ts
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  push:
    branches:
      - main
    paths:
      - .github/workflows/webui-ci.yml
      - i0c.runtime.config.ts
      - i0c.runtime.manifests.ts
      - i0c.webui.config.ts
      - i0c.webui.manifests.ts
      - apps/webui/**
      - packages/config/**
      - packages/plugin-api/**
      - packages/plugin-catalog/**
      - packages/runtime-build/src/config.ts
      - packages/analytics-domain/**
      - plugins/source/github/**
      - plugins/store/**
      - plugins/**/src/manifest.ts
      - plugins/runtime/**/src/installation.ts
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webui-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # Build-only placeholders; these are not valid credentials.
      GITHUB_CLIENT_ID: ci-client-id
      GITHUB_CLIENT_SECRET: ci-client-secret
      NEXTAUTH_SECRET: ci-nextauth-secret-not-for-production
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test WebUI
        run: pnpm webui:test

      - name: Lint WebUI
        run: pnpm webui:lint

      - name: Build WebUI
        run: pnpm webui:build
