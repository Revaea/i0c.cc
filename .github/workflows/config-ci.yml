name: Config CI

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/config-ci.yml
      - packages/config/**
      - packages/plugin-api/**
      - packages/plugin-catalog/**
      - plugins/**/src/config.ts
      - plugins/**/src/manifest.ts
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  push:
    branches:
      - main
    paths:
      - .github/workflows/config-ci.yml
      - packages/config/**
      - packages/plugin-api/**
      - packages/plugin-catalog/**
      - plugins/**/src/config.ts
      - plugins/**/src/manifest.ts
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: config-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check shared configuration
        run: pnpm config:check

      - name: Test installed plugin configuration
        run: pnpm --filter @i0c/plugin-catalog test
